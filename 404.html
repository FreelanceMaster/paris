<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Page introuvable · BLACK PARIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07080C; --gold:#C9A84C; --gold-soft:#E8C97A;
    --serif:'Playfair Display', Georgia, serif;
    --sans:'Inter', system-ui, sans-serif;
    --txt:#ECECEC; --muted:rgba(255,255,255,.5);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(201,168,76,.10), transparent 60%),
      var(--bg);
    color:var(--txt); font-family:var(--sans);
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:24px; text-align:center;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:420px}
  .code{
    font-family:var(--serif); font-weight:800;
    font-size:clamp(84px,26vw,140px); line-height:1;
    letter-spacing:-2px;
    background:linear-gradient(180deg,var(--gold-soft),var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 8px 40px rgba(201,168,76,.18);
  }
  .line{
    width:52px; height:1px; margin:22px auto;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
  }
  h1{
    font-family:var(--serif); font-weight:700;
    font-size:clamp(20px,5.5vw,26px); letter-spacing:.5px; margin-bottom:14px;
  }
  p{color:var(--muted); font-weight:300; line-height:1.6; font-size:14px; margin-bottom:30px}
  a.home{
    display:inline-block; text-decoration:none;
    font-family:var(--serif); font-style:italic; font-size:15px;
    color:#1a1200;
    background:linear-gradient(180deg,var(--gold-soft),var(--gold));
    padding:13px 30px; border-radius:12px; letter-spacing:.3px;
    box-shadow:0 6px 22px rgba(201,168,76,.28);
    transition:transform .18s ease, box-shadow .22s ease;
  }
  a.home:hover{transform:translateY(-1px); box-shadow:0 10px 28px rgba(201,168,76,.36)}
  a.home:active{transform:scale(.98)}
  a.home:focus-visible{outline:2px solid var(--gold); outline-offset:3px}
  .brand{
    margin-top:40px; font-family:var(--serif); letter-spacing:4px;
    font-size:11px; color:var(--gold); opacity:.7; text-transform:uppercase;
  }
</style>
</head>
<body>
  <main class="wrap">
    <div class="code">404</div>
    <div class="line"></div>
    <h1>Oups, cette page n'existe pas.</h1>
    <p>Le lien que vous avez suivi est introuvable ou a été déplacé.</p>
    <a class="home" href="https://freelancemaster.github.io/paris/">Retour à l'accueil</a>
    <div class="brand">Black Paris</div>
  </main>
</body>
</html>
